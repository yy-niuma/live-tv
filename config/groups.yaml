groups:
  - name: "中国大陆"
    keywords:
      - "CCTV"
      - "央视频"
      - "中国"
      - "北京"
      - "上海"
      - "广东"
      - "浙江"
      - "江苏"
      - "湖南"
      - "湖北"
      - "四川"
      - "山东"
      - "福建"
      - "安徽"
      - "河北"
      - "河南"
      - "辽宁"
      - "吉林"
      - "黑龙江"
      - "江西"
      - "山西"
      - "陕西"
      - "甘肃"
      - "新疆"
      - "内蒙古"
      - "宁夏"
      - "青海"
      - "西藏"
