      "cctv-1": "CCTV-1 综合"
      "cctv-2": "CCTV-2 财经"

  - name: "港澳台"
    keywords:
      - "TVB"
      - "无线"
      - "亚视"
      - "香港"
      - "澳门"
      - "台湾"
      - "中天"
      - "东森"
      - "华视"
      - "台视"
      - "民视"
      - "三立"
      - "TVBS"
      - "JET"
    regex:
      - ".*\\(HK\\).*"
      - ".*\\(TW\\).*"

  - name: "海外国际"
    keywords:
      - "BBC"
      - "CNN"
      - "NHK"
      - "FOX"
      - "ABC"
      - "CBS"
      - "NBC"
      - "Discovery"
      - "National Geographic"
      - "HBO"
      - "BBC"
      - "Sky"
      - "Bloomberg"
      - "Al Jazeera"
    default: true
